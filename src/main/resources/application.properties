spring.application.name=product-service

server.port=${SERVER_PORT:8081}

# Eureka server registry location. In Docker, override via -e EUREKA_URI=http://host.docker.internal:8761/eureka
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}

# properties for registering with eureka server
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# in order to log the tracing of the orderclient request
logging.level.com.training.productservice.client=DEBUG

# In Docker, override via -e ORDER_SERVICE_URL=http://host.docker.internal:8080
order-service.base-url=${ORDER_SERVICE_URL:http://localhost:8080}

# In Docker, override via -e DB_URL=jdbc:postgresql://host.docker.internal:5432/productdb
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/productdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.url=/openapi.yaml
springdoc.packages-to-scan=com.training.productservice.none
